name: e2e-test-ios

on:
  pull_request:
    branches: ['main']

jobs:
  build_ios:
    type: build
    params:
      platform: ios
      profile: e2e-test

  maestro_test:
    needs: [build_ios]
    type: maestro
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      flow_path:
        - '.maestro/01_app_launches.yml'
        - '.maestro/02_sign_in_validation.yml'
